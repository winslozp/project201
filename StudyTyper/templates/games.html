{% extends "base.html" %}

{% block title %}Games{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='styles/gamesStyles.css') }}">
<script src="{{ url_for('static', filename='scripts/keystroke_game.js') }}" defer></script>
{% endblock %}

{% block content %}
<div class="keystroke-game" id="keystroke-game">
    <h2>Keystroke Streak</h2>
    <p>Type the prompt exactly — one wrong key resets your streak.</p>

    <div class="ks-stats">
        <span>Streak: <strong id="ks-streak">0</strong></span>
        <span>Best: <strong id="ks-best">0</strong></span>
        <span id="ks-last-wrap" style="display:none">Last: <strong id="ks-last">0</strong></span>
    </div>

    <div class="ks-prompt" id="ks-prompt"></div>

    <div class="ks-progress-track">
        <div class="ks-progress-bar" id="ks-progress-bar"></div>
    </div>

    <button class="ks-reset-btn" id="ks-reset-btn">Reset</button>
</div>
{% endblock %}
