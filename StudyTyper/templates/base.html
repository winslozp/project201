<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Study Typer{% endblock %}</title>
    <!-- Default/global styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/styles.css') }}">

    <!-- For each page to implement -->
    {% block css %}{% endblock %}
</head>
<body>

    <nav class="app-topbar" aria-label="Main navigation">
        <a href="{{ url_for('notes') }}" class="app-logo-link" aria-label="Study Typer — Notes">
            <img src="{{ url_for('static', filename='Logos/StudyTyperLogo2.png') }}" alt="Study Typer" class="app-logo" width="48" height="48">
        </a>
        <div class="app-nav-links">
            <a href="{{ url_for('notes') }}">Notes</a>
            <span class="nav-divider" aria-hidden="true">|</span>
            <a href="{{ url_for('flashcards') }}">Flashcards</a>
            <span class="nav-divider" aria-hidden="true">|</span>
            <a href="{{ url_for('games') }}">Games</a>
            <span class="nav-divider" aria-hidden="true">|</span>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <p class="welcome-line">Welcome, {{ username }}!</p>
    
    <div class="page-shell">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
